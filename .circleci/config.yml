version: 2.1

jobs:
  build-and-test:
    machine:
      image: ubuntu-2004:current
      docker_layer_caching: true
    steps:
      - checkout
      - run: make deps
      - run: make lint
      - run: make test
      - run: make docker_build
      - run:
          name: Docker Hub Login and Push
          command: |
            printf '%s' "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
            make docker_push

workflows:
  basic:
    jobs:
      - build-and-test